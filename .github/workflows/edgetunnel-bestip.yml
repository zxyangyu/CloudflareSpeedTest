name: Update EdgeTunnel Best IP

on:
  workflow_dispatch:
    inputs:
      port:
        description: "EdgeTunnel node port"
        required: false
        default: "443"
      colo:
        description: "Optional Cloudflare colo filter, for example HKG,NRT,LAX"
        required: false
        default: ""
      count:
        description: "How many IPs to download-test and publish"
        required: false
        default: "20"
      max_delay:
        description: "Max average latency in ms"
        required: false
        default: "300"
      min_speed:
        description: "Min download speed in MB/s"
        required: false
        default: "0"
  schedule:
    - cron: "15 */8 * * *"

permissions:
  contents: write

concurrency:
  group: edgetunnel-bestip
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update bestip.txt
        env:
          CFST_PORT: ${{ github.event.inputs.port || '443' }}
          CFST_COLO: ${{ github.event.inputs.colo || '' }}
          CFST_DOWNLOAD_COUNT: ${{ github.event.inputs.count || '20' }}
          BESTIP_LIMIT: ${{ github.event.inputs.count || '20' }}
          CFST_MAX_DELAY: ${{ github.event.inputs.max_delay || '300' }}
          CFST_MIN_SPEED: ${{ github.event.inputs.min_speed || '0' }}
          CFST_MAX_LOSS_RATE: "0"
          BESTIP_FALLBACK_COLO: "CF"
        run: bash script/update_edgetunnel_bestip.sh

      - name: Commit bestip.txt
        run: |
          git add bestip.txt
          if git diff --cached --quiet; then
            echo "bestip.txt is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update edgetunnel bestip"
          git push
